<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flight Dynamics Module</title>
    <style>
        :root { 
            --bg-color: #f0f2f5; 
            --text-color: #2d3436; 
            --primary-blue: #0984e3;
            --warning-red: #d63031;
            --warning-orange: #e67e22;
            --canvas-bg: #ffffff;
            --tab-bg: #dfe6e9;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', 'Pretendard', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden; 
        }

        /* 탭 스타일 */
        .tab-container { display: flex; background: var(--tab-bg); padding: 10px 10px 0; border-bottom: 2px solid #ccc; flex-shrink: 0; }
        .tab { 
            flex: 1; text-align: center; padding: 12px 10px; cursor: pointer; 
            border-radius: 8px 8px 0 0; background: #b2bec3; margin-right: 5px; 
            font-weight: bold; font-size: 0.9em; transition: 0.3s; 
        }
        .tab.active { background: #fff; color: var(--primary-blue); border: 2px solid #ccc; border-bottom: none; position: relative; bottom: -2px; }
        
        /* 콘텐츠 영역 */
        .content-area { display: none; flex: 1; position: relative; overflow: hidden; }
        .content-area.active { display: flex; flex-direction: column; }

        /* 이론 설명 페이지 */
        #theoryContent { padding: 20px; overflow-y: auto; background: white; -webkit-overflow-scrolling: touch; }
        .section-title { border-left: 5px solid var(--primary-blue); padding-left: 12px; margin: 25px 0 15px; font-size: 1.1em; }
        .force-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .force-card { background: #f8f9fa; border-radius: 8px; padding: 12px; border-top: 3px solid var(--primary-blue); font-size: 0.85em; }
        .danger-card { border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-top: 4px solid var(--warning-red); }

        /* 시뮬레이션 페이지 구조 개편 */
        #simContent { display: none; flex-direction: column; height: 100%; background: #e0e4e8; }
        #simContent.active { display: flex; }

        /* 시각화 영역 (상단) */
        .canvas-container { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            padding: 10px;
        }
        #simCanvas { 
            background-color: var(--canvas-bg); 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 100%;
            max-height: 100%;
        }

        /* 하단 조종 패널 영역 */
        .control-panel { 
            background: white; 
            padding: 20px; 
            border-top: 2px solid #ccc; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            flex-shrink: 0;
        }

        .control-row { display: flex; align-items: center; gap: 15px; }
        .control-row label { min-width: 80px; font-weight: bold; font-size: 0.9em; }
        .control-row input { flex: 1; height: 30px; }
        .value-display { min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; font-weight: bold; color: var(--primary-blue); }

        /* 상태 알림 */
        .status-overlay { 
            position: absolute; top: 20px; right: 20px; text-align: right; pointer-events: none; 
        }
        .warning-text { font-weight: bold; font-size: 1.1em; margin: 0; display: none; }
        #stallTxt { color: var(--warning-red); }
        #overspeedTxt { color: var(--warning-orange); }

        @media (min-width: 768px) {
            .control-panel { flex-direction: row; justify-content: center; padding: 30px; }
            .control-row { width: 400px; }
        }
    </style>
</head>
<body>

    <div class="tab-container">
        <div class="tab active" onclick="openTab(event, 'theoryContent')">이론 학습</div>
        <div class="tab" onclick="openTab(event, 'simContent')">비행 시뮬레이션</div>
    </div>

    <div id="theoryContent" class="content-area active">
        <h2>항공 역학 핵심 정리</h2>
        <div class="section-title">비행의 4대 요소</div>
        <div class="force-grid">
            <div class="force-card"><h4>양력</h4><p>떠오르는 힘</p></div>
            <div class="force-card"><h4>중력</h4><p>당기는 힘</p></div>
            <div class="force-card"><h4>추력</h4><p>나가는 힘</p></div>
            <div class="force-card"><h4>항력</h4><p>버티는 힘</p></div>
        </div>
        <div class="section-title">위험 상태</div>
        <div class="danger-card">
            <strong>실속 (Stall):</strong> 기수 각도가 너무 높으면 기류가 박리되어 추락합니다.
        </div>
        <div class="danger-card" style="border-top-color: var(--warning-orange);">
            <strong>과속 (Overspeed):</strong> 한계 속도를 넘으면 기체가 파손될 수 있습니다.
        </div>
    </div>

    <div id="simContent" class="content-area">
        <div class="canvas-container">
            <div class="status-overlay">
                <p id="statusNormal" style="color: var(--primary-blue); font-weight: bold;">Normal Flight</p>
                <p id="stallTxt" class="warning-text">⚠️ STALL</p>
                <p id="overspeedTxt" class="warning-text">⚠️ OVERSPEED</p>
            </div>
            <canvas id="simCanvas"></canvas>
        </div>

        <div class="control-panel">
            <div class="control-row">
                <label>기수 각도</label>
                <input type="range" id="pitchRange" min="-45" max="45" value="0">
                <div class="value-display"><span id="pitchVal">0</span>°</div>
            </div>
            <div class="control-row">
                <label>비행 속도</label>
                <input type="range" id="speedRange" min="1" max="15" value="5">
                <div class="value-display"><span id="speedVal">5</span></div>
            </div>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("content-area");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(tabId === 'simContent') resizeCanvas();
        }

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const pitchRange = document.getElementById('pitchRange');
        const speedRange = document.getElementById('speedRange');
        const pitchValTxt = document.getElementById('pitchVal');
        const speedValTxt = document.getElementById('speedVal');

        let particles = [];
        let currentPitch = 0;

        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            canvas.width = container.clientWidth - 20;
            canvas.height = Math.min(container.clientHeight - 20, 400);
            createParticles();
        }

        function createParticles() {
            particles = [];
            const count = (canvas.width * canvas.height) / 800;
            for (let i = 0; i < count; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, v: 1 + Math.random() * 2 });
            }
        }

        function draw() {
            if (!document.getElementById('simContent').classList.contains('active')) {
                requestAnimationFrame(draw);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            const targetPitch = parseInt(pitchRange.value); 
            currentPitch += (targetPitch - currentPitch) * 0.1;
            pitchValTxt.innerText = Math.round(currentPitch);
            const pitchRad = currentPitch * (Math.PI / 180); 
            const baseSpeed = parseInt(speedRange.value);
            speedValTxt.innerText = baseSpeed;

            const isStall = currentPitch > 18;       
            const isOverspeed = currentPitch < -20;  

            document.getElementById('statusNormal').style.display = (!isStall && !isOverspeed) ? 'block' : 'none';
            document.getElementById('stallTxt').style.display = isStall ? 'block' : 'none';
            document.getElementById('overspeedTxt').style.display = isOverspeed ? 'block' : 'none';

            let flowSpeed = isOverspeed ? baseSpeed * 2.5 : baseSpeed;
            let flowAngle = 0; 
            if (isStall) flowAngle = -35 * (Math.PI / 180); 
            else if (isOverspeed) flowAngle = -20 * (Math.PI / 180); 

            ctx.fillStyle = isStall ? "#ff3f34" : isOverspeed ? "#f39c12" : "#0984e3";
            particles.forEach(p => {
                p.x += Math.cos(flowAngle) * (flowSpeed + p.v);
                p.y += Math.sin(flowAngle) * (flowSpeed + p.v);

                if (p.x > canvas.width + 20) p.x = -20;
                if (p.x < -20) p.x = canvas.width + 20;
                if (p.y > canvas.height + 20) p.y = -20;
                if (p.y < -20) p.y = canvas.height + 20;

                let dx = p.x - cx;
                let dy = p.y - cy;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < canvas.width * 0.2) {
                    if (isStall && dx > 0) p.y += (Math.random() - 0.5) * 15;
                    else {
                        let influence = (canvas.width * 0.2 - dist) / (canvas.width * 0.2);
                        p.y += Math.sin(pitchRad) * flowSpeed * influence;
                    }
                }
                ctx.fillRect(p.x, p.y, 2, 2);
            });

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(pitchRad); 
            ctx.fillStyle = "#2d3436";
            const planeW = Math.min(canvas.width * 0.3, 150);
            const planeH = planeW * 0.12;
            ctx.fillRect(-planeW/2, -planeH/2, planeW, planeH); 
            ctx.fillStyle = "#000";
            ctx.fillRect(-planeW/2 - 5, -planeH/4, 5, planeH/2); 
            ctx.restore();

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        draw();
    </script>
</body>
</html>
