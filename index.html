<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flight Dynamics Learning Module</title>
    <style>
        :root { 
            --bg-color: #f0f2f5; 
            --text-color: #2d3436; 
            --primary-blue: #0984e3;
            --warning-red: #d63031;
            --warning-orange: #e67e22;
            --canvas-bg: #ffffff;
            --tab-bg: #dfe6e9;
            --accent-green: #27ae60;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', 'Pretendard', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
        }

        /* 탭 스타일 */
        .tab-container { display: flex; background: var(--tab-bg); padding: 10px 10px 0; border-bottom: 2px solid #ccc; flex-shrink: 0; }
        .tab { 
            flex: 1;
            text-align: center;
            padding: 12px 10px; 
            cursor: pointer; 
            border-radius: 8px 8px 0 0; 
            background: #b2bec3; 
            margin-right: 5px; 
            font-weight: bold; 
            font-size: 0.9em;
            transition: 0.3s; 
        }
        .tab.active { background: var(--canvas-bg); color: var(--primary-blue); border: 2px solid #ccc; border-bottom: none; position: relative; bottom: -2px; }
        
        /* 콘텐츠 영역 */
        .content-area { display: none; flex: 1; position: relative; overflow: hidden; }
        .content-area.active { display: flex; flex-direction: column; }

        /* 이론 설명 페이지 스타일 */
        #theoryContent { padding: 20px; overflow-y: auto; background: white; -webkit-overflow-scrolling: touch; }
        .section-title { border-left: 5px solid var(--primary-blue); padding-left: 12px; margin: 25px 0 15px; color: #2c3e50; font-size: 1.2em; }
        
        .force-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .force-card { background: #f8f9fa; border-radius: 10px; padding: 15px; border-top: 4px solid var(--primary-blue); font-size: 0.9em; }
        .force-card h4 { margin: 0 0 8px 0; color: var(--primary-blue); }

        .danger-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 15px; }
        @media (min-width: 769px) { .danger-grid { grid-template-columns: 1fr 1fr; } }

        .danger-card { border: 1px solid #eee; padding: 20px; border-radius: 15px; background: #fff; position: relative; }
        .danger-card.stall { border-top: 5px solid var(--warning-red); }
        .danger-card.overspeed { border-top: 5px solid var(--warning-orange); }
        .danger-tag { position: absolute; top: -10px; right: 15px; background: #333; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.7em; }

        /* 시뮬레이션 페이지 스타일 */
        #simContent { align-items: center; justify-content: center; background: #e0e4e8; padding: 10px; }
        .settings-container { position: absolute; top: 15px; left: 15px; z-index: 100; }
        #settingsBtn { padding: 10px 18px; cursor: pointer; border-radius: 50px; border: none; background: var(--primary-blue); color: white; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        #settingsPanel { 
            position: absolute; top: 55px; left: 0; background: white; padding: 20px; 
            border-radius: 15px; border: 1px solid #ddd; min-width: 260px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .hidden { display: none; }
        .settingItem { margin-top: 15px; font-size: 0.9em; font-weight: bold; }
        input[type="range"] { width: 100%; height: 25px; margin-top: 8px; }
        
        #simCanvas { 
            background-color: var(--canvas-bg); 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .status-box { position: absolute; top: 15px; right: 15px; text-align: right; z-index: 90; pointer-events: none; }
        .warning { font-weight: bold; font-size: 1.2em; display: none; margin: 0; }
        #stallTxt { color: var(--warning-red); }
        #overspeedTxt { color: var(--warning-orange); }
        .normal-flight { color: var(--primary-blue); font-weight: bold; font-size: 1em; }

        @media (max-width: 480px) {
            .status-box { top: auto; bottom: 20px; right: 20px; }
            .section-title { font-size: 1.1em; }
            h2 { font-size: 1.3em; }
        }
    </style>
</head>
<body>

    <div class="tab-container">
        <div class="tab active" onclick="openTab(event, 'theoryContent')">이론 학습</div>
        <div class="tab" onclick="openTab(event, 'simContent')">시뮬레이션</div>
    </div>

    <div id="theoryContent" class="content-area active">
        <h2>항공 역학 입문</h2>
        <p style="color: #636e72; font-size: 0.9em;">비행기의 4가지 힘과 한계 상태 학습</p>

        <h3 class="section-title">비행의 4대 요소</h3>
        <div class="force-grid">
            <div class="force-card"><h4>양력</h4><p>위로 뜨는 힘</p></div>
            <div class="force-card" style="border-top-color: var(--accent-green);"><h4>중력</h4><p>아래로 당기는 힘</p></div>
            <div class="force-card" style="border-top-color: var(--warning-orange);"><h4>추력</h4><p>앞으로 나가는 힘</p></div>
            <div class="force-card" style="border-top-color: #636e72;"><h4>항력</h4><p>방해하는 저항</p></div>
        </div>

        <h3 class="section-title">비행 위험 상태</h3>
        <div class="danger-grid">
            <div class="danger-card stall">
                <div class="danger-tag" style="background:var(--warning-red)">위험: 상</div>
                <h3>실속 (Stall)</h3>
                <p>기수를 너무 높이면 공기 흐름이 끊겨 양력을 잃고 추락합니다.</p>
            </div>
            <div class="danger-card overspeed">
                <div class="danger-tag" style="background:var(--warning-orange)">위험: 중</div>
                <h3>과속 (Overspeed)</h3>
                <p>제한 속도를 넘으면 기체가 진동하며 파손될 위험이 큽니다.</p>
            </div>
        </div>
    </div>

    <div id="simContent" class="content-area">
        <div class="settings-container">
            <button id="settingsBtn">조종 패널</button>
            <div id="settingsPanel" class="hidden">
                <div class="settingItem">
                    기수 각도: <span id="pitchVal">0</span>°
                    <input type="range" id="pitchRange" min="-45" max="45" value="0">
                </div>
                <div class="settingItem">
                    비행 속도: <span id="speedVal">5</span>
                    <input type="range" id="speedRange" min="1" max="15" value="5">
                </div>
                <button onclick="document.getElementById('settingsPanel').classList.add('hidden')" style="margin-top:15px; width:100%; padding:8px; border:none; border-radius:5px; background:#eee;">닫기</button>
            </div>
        </div>

        <div class="status-box">
            <div id="statusNormal" class="normal-flight">Steady Flight</div>
            <p id="stallTxt" class="warning">⚠️ STALL</p>
            <p id="overspeedTxt" class="warning">⚠️ OVERSPEED</p>
        </div>

        <canvas id="simCanvas"></canvas>
    </div>

    <script>
        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("content-area");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
            if(tabId === 'simContent') resizeCanvas();
        }

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const pitchRange = document.getElementById('pitchRange');
        const speedRange = document.getElementById('speedRange');
        const pitchValTxt = document.getElementById('pitchVal');
        const speedValTxt = document.getElementById('speedVal');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');

        const statusNormal = document.getElementById('statusNormal');
        const stallTxt = document.getElementById('stallTxt');
        const overspeedTxt = document.getElementById('overspeedTxt');

        let particles = [];
        let currentPitch = 0;

        function resizeCanvas() {
            const displayWidth = Math.min(window.innerWidth - 40, 800);
            const displayHeight = Math.min(window.innerHeight * 0.6, 500);
            canvas.width = displayWidth;
            canvas.height = displayHeight;
            createParticles();
        }

        function createParticles() {
            particles = [];
            const count = (canvas.width * canvas.height) / 800;
            for (let i = 0; i < count; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, v: 1 + Math.random() * 2 });
            }
        }

        settingsBtn.onclick = (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('hidden');
        };

        function draw() {
            if (!document.getElementById('simContent').classList.contains('active')) {
                requestAnimationFrame(draw);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            const targetPitch = parseInt(pitchRange.value); 
            currentPitch += (targetPitch - currentPitch) * 0.1;
            pitchValTxt.innerText = Math.round(currentPitch);
            const pitchRad = currentPitch * (Math.PI / 180); 
            const baseSpeed = parseInt(speedRange.value);
            speedValTxt.innerText = baseSpeed;

            const isStall = currentPitch > 18;       
            const isOverspeed = currentPitch < -20;  

            statusNormal.style.display = (!isStall && !isOverspeed) ? 'block' : 'none';
            stallTxt.style.display = isStall ? 'block' : 'none';
            overspeedTxt.style.display = isOverspeed ? 'block' : 'none';

            let flowSpeed = isOverspeed ? baseSpeed * 2.5 : baseSpeed;
            let flowAngle = 0; 
            if (isStall) flowAngle = -35 * (Math.PI / 180); 
            else if (isOverspeed) flowAngle = -20 * (Math.PI / 180); 

            ctx.fillStyle = isStall ? "#ff3f34" : isOverspeed ? "#f39c12" : "#0984e3";
            particles.forEach(p => {
                p.x += Math.cos(flowAngle) * (flowSpeed + p.v);
                p.y += Math.sin(flowAngle) * (flowSpeed + p.v);

                if (p.x > canvas.width + 20) p.x = -20;
                if (p.x < -20) p.x = canvas.width + 20;
                if (p.y > canvas.height + 20) p.y = -20;
                if (p.y < -20) p.y = canvas.height + 20;

                let dx = p.x - cx;
                let dy = p.y - cy;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < canvas.width * 0.2) {
                    if (isStall && dx > 0) p.y += (Math.random() - 0.5) * 15;
                    else {
                        let influence = (canvas.width * 0.2 - dist) / (canvas.width * 0.2);
                        p.y += Math.sin(pitchRad) * flowSpeed * influence;
                    }
                }
                ctx.fillRect(p.x, p.y, 2, 2);
            });

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(pitchRad); 
            ctx.fillStyle = "#2d3436";
            const planeW = canvas.width * 0.2;
            const planeH = planeW * 0.12;
            ctx.fillRect(-planeW/2, -planeH/2, planeW, planeH); 
            ctx.fillStyle = "#000";
            ctx.fillRect(-planeW/2 - 5, -planeH/4, 5, planeH/2); 
            ctx.restore();

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        draw();
    </script>
</body>
</html>
